<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #00ff88;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        p.subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #00ff88;
            font-weight: bold;
        }
        input[type="file"] {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #00cc66; }
        .score-box {
            text-align: center;
            padding: 20px;
            background: #0a2a1a;
            border-radius: 12px;
            border: 2px solid #00ff88;
            margin-bottom: 20px;
        }
        .score-box h2 {
            font-size: 3rem;
            color: #00ff88;
        }
        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .keyword {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        .matched { background: #0a2a1a; color: #00ff88; border: 1px solid #00ff88; }
        .missing { background: #2a0a0a; color: #ff4444; border: 1px solid #ff4444; }
        .feedback-box {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
            white-space: pre-wrap;
            line-height: 1.8;
            color: #ddd;
        }
        .loading {
            text-align: center;
            color: #00ff88;
            font-size: 18px;
            padding: 20px;
            display: none;
        }
        #results { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Resume Analyzer</h1>
        <p class="subtitle">Upload your resume and get AI-powered feedback instantly</p>

        <div class="card">
            <label>📄 Upload Resume (PDF or TXT)</label>
            <input type="file" id="resumeFile" accept=".pdf,.txt">

            <label>💼 Job Description (Optional)</label>
            <textarea id="jobDesc" 
                placeholder="Paste the job description here to get a match score and targeted feedback..."></textarea>

            <button onclick="analyzeResume()">🚀 Analyze Resume</button>
        </div>

        <div class="loading" id="loading">
            ⏳ Analyzing your resume with AI... Please wait...
        </div>

        <div id="results">
            <div class="score-box" id="scoreBox">
                <p style="color:#888">Match Score</p>
                <h2 id="scoreValue">-</h2>
            </div>

            <div class="card" id="keywordsBox">
                <label>✅ Matched Keywords</label>
                <div class="keywords" id="matchedKeywords"></div>
                <br>
                <label>❌ Missing Keywords</label>
                <div class="keywords" id="missingKeywords"></div>
            </div>

            <div class="card">
                <label>🧠 AI Feedback</label>
                <div class="feedback-box" id="feedbackBox"></div>
            </div>
        </div>
    </div>

    <script>
        async function analyzeResume() {
            const fileInput = document.getElementById('resumeFile');
            const jobDesc = document.getElementById('jobDesc').value;

            if (!fileInput.files[0]) {
                alert('Please upload a resume first!');
                return;
            }

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';

            const formData = new FormData();
            formData.append('resume', fileInput.files[0]);
            formData.append('job_description', jobDesc);

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    alert('Error: ' + data.error);
                    return;
                }

                // Show score
                const score = data.match_score;
                document.getElementById('scoreValue').textContent = 
                    score === 'N/A' ? 'N/A' : score + '%';

                // Show keywords
                const matchedDiv = document.getElementById('matchedKeywords');
                const missingDiv = document.getElementById('missingKeywords');
                matchedDiv.innerHTML = '';
                missingDiv.innerHTML = '';

                if (data.matched_keywords.length > 0) {
                    data.matched_keywords.forEach(kw => {
                        matchedDiv.innerHTML += 
                            `<span class="keyword matched">${kw}</span>`;
                    });
                } else {
                    matchedDiv.innerHTML = '<span style="color:#888">None found</span>';
                }

                if (data.missing_keywords.length > 0) {
                    data.missing_keywords.forEach(kw => {
                        missingDiv.innerHTML += 
                            `<span class="keyword missing">${kw}</span>`;
                    });
                } else {
                    missingDiv.innerHTML = 
                        '<span style="color:#888">No missing keywords</span>';
                }

                // Hide keywords box if no job description
                document.getElementById('keywordsBox').style.display = 
                    score === 'N/A' ? 'none' : 'block';

                // Show feedback
                document.getElementById('feedbackBox').textContent = data.feedback;

                // Show results
                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';

            } catch (error) {
                alert('Something went wrong: ' + error.message);
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
